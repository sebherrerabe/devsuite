name: desktop-release

on:
  push:
    tags:
      - 'v*'

jobs:
  windows-desktop-release:
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: write
    env:
      DEVSUITE_WINDOWS_CERT_PFX_BASE64: ${{ secrets.DEVSUITE_WINDOWS_CERT_PFX_BASE64 }}
      DEVSUITE_WINDOWS_CERT_PASSWORD: ${{ secrets.DEVSUITE_WINDOWS_CERT_PASSWORD }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate desktop version matches tag
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./apps/desktop/package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match apps/desktop/package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Build shared package
        run: pnpm --filter @devsuite/shared build

      - name: Build web app
        env:
          VITE_CONVEX_URL: ${{ vars.VITE_CONVEX_URL }}
          VITE_CONVEX_SITE_URL: ${{ vars.VITE_CONVEX_SITE_URL }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
          VITE_GH_SERVICE_URL: ${{ vars.VITE_GH_SERVICE_URL }}
          VITE_GH_SERVICE_TOKEN: ${{ secrets.VITE_GH_SERVICE_TOKEN }}
          VITE_NOTION_SERVICE_URL: ${{ vars.VITE_NOTION_SERVICE_URL }}
          VITE_NOTION_SERVICE_TOKEN: ${{ secrets.VITE_NOTION_SERVICE_TOKEN }}
          VITE_WEB_PUSH_VAPID_PUBLIC_KEY: ${{ secrets.VITE_WEB_PUSH_VAPID_PUBLIC_KEY }}
          VITE_DESKTOP_INSTALLER_URL: ${{ vars.VITE_DESKTOP_INSTALLER_URL }}
        run: pnpm --filter @devsuite/web build

      - name: Desktop unit tests
        run: pnpm --filter @devsuite/desktop test:unit

      - name: Desktop integration tests
        run: pnpm --filter @devsuite/desktop test:int

      - name: Desktop process monitor overhead benchmark
        env:
          DEVSUITE_PROCESS_MONITOR_P95_MS: '120'
          DEVSUITE_PROCESS_MONITOR_BENCH_ITERS: '50'
          DEVSUITE_PROCESS_MONITOR_BENCH_PROCESSES: '7000'
        run: pnpm --filter @devsuite/desktop test:process-overhead

      - name: Desktop E2E tests
        env:
          DEVSUITE_E2E_ALLOW_NON_WINDOWS: '1'
        run: pnpm --filter @devsuite/desktop test:e2e

      - name: Configure Windows code signing
        if: ${{ env.DEVSUITE_WINDOWS_CERT_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "devsuite-authenticode.pfx"
          [System.IO.File]::WriteAllBytes(
            $certPath,
            [System.Convert]::FromBase64String($env:DEVSUITE_WINDOWS_CERT_PFX_BASE64)
          )
          "WIN_CSC_LINK=$certPath" >> $env:GITHUB_ENV
          "CSC_LINK=$certPath" >> $env:GITHUB_ENV
          if (-not [string]::IsNullOrWhiteSpace($env:DEVSUITE_WINDOWS_CERT_PASSWORD)) {
            "WIN_CSC_KEY_PASSWORD=$env:DEVSUITE_WINDOWS_CERT_PASSWORD" >> $env:GITHUB_ENV
            "CSC_KEY_PASSWORD=$env:DEVSUITE_WINDOWS_CERT_PASSWORD" >> $env:GITHUB_ENV
          }

      - name: Code signing not configured
        if: ${{ env.DEVSUITE_WINDOWS_CERT_PFX_BASE64 == '' }}
        run: echo "No Windows signing cert configured. Producing unsigned installer (SmartScreen warning expected)."

      - name: Build Windows release artifacts
        env:
          VITE_CONVEX_URL: ${{ vars.VITE_CONVEX_URL }}
          VITE_CONVEX_SITE_URL: ${{ vars.VITE_CONVEX_SITE_URL }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
          VITE_GH_SERVICE_URL: ${{ vars.VITE_GH_SERVICE_URL }}
          VITE_GH_SERVICE_TOKEN: ${{ secrets.VITE_GH_SERVICE_TOKEN }}
          VITE_NOTION_SERVICE_URL: ${{ vars.VITE_NOTION_SERVICE_URL }}
          VITE_NOTION_SERVICE_TOKEN: ${{ secrets.VITE_NOTION_SERVICE_TOKEN }}
          VITE_WEB_PUSH_VAPID_PUBLIC_KEY: ${{ secrets.VITE_WEB_PUSH_VAPID_PUBLIC_KEY }}
          VITE_DESKTOP_INSTALLER_URL: ${{ vars.VITE_DESKTOP_INSTALLER_URL }}
        run: pnpm --filter @devsuite/desktop make:win

      - name: Resolve update asset names
        id: release_assets
        shell: bash
        run: |
          ASSET_NAME=$(node -e "const fs=require('fs'); const raw=fs.readFileSync('apps/desktop/out/latest.yml','utf8'); const match=raw.match(/^path:\\s*(.+)$/m); if (!match) { throw new Error('latest.yml is missing a path entry'); } process.stdout.write(match[1].trim());")
          if [ ! -f "apps/desktop/out/$ASSET_NAME" ]; then
            echo "Expected installer asset apps/desktop/out/$ASSET_NAME not found."
            ls -la apps/desktop/out
            exit 1
          fi
          if [ ! -f "apps/desktop/out/$ASSET_NAME.blockmap" ]; then
            echo "Expected blockmap apps/desktop/out/$ASSET_NAME.blockmap not found."
            ls -la apps/desktop/out
            exit 1
          fi
          echo "asset_name=$ASSET_NAME" >> "$GITHUB_OUTPUT"

      - name: Installer smoke test
        run: pnpm --filter @devsuite/desktop test:install-smoke:existing

      - name: Create or update GitHub Release
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          ASSET_NAME="${{ steps.release_assets.outputs.asset_name }}"
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" \
              "apps/desktop/out/$ASSET_NAME" \
              "apps/desktop/out/$ASSET_NAME.blockmap" \
              apps/desktop/out/latest*.yml \
              --clobber \
              --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG_NAME" \
              "apps/desktop/out/$ASSET_NAME" \
              "apps/desktop/out/$ASSET_NAME.blockmap" \
              apps/desktop/out/latest*.yml \
              --title "DevSuite ${GITHUB_REF_NAME#v}" \
              --notes "Stable Windows desktop release ${GITHUB_REF_NAME#v}." \
              --repo "$GITHUB_REPOSITORY"
          fi
